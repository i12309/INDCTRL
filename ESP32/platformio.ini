; INDCTRL ESP32 front panel skeleton.
; Hardware/display target is aligned with Harvester32/Front32 JC8048W550C.

[platformio]
default_envs = JC8048W550C

[env:JC8048W550C]
platform = espressif32@6.12.0
board = JC8048W550C
framework = arduino
board_build.cxx_std = 17
build_unflags =
    -std=gnu++11
board_build.filesystem = littlefs
board_build.fs_dir = data
board_build.partitions = default_16MB.csv
build_flags =
    -I src
    -I include
    -I lib
    -I lib/esp32-smartdisplay/include
    -I lib/lvgl
    -I lib/lvgl/src
    -std=gnu++17
    -D LV_CONF_PATH=\"lv_conf.h\"
lib_deps =
    bblanchon/ArduinoJson@^7.4.2
