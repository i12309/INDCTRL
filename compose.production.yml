services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - indctrl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  auth-service:
    build:
      context: .
      dockerfile: docker/auth-service.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - indctrl

  event-service:
    build:
      context: .
      dockerfile: docker/event-service.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - indctrl

  control-web:
    build:
      context: .
      dockerfile: docker/control-web.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DJANGO_DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
    expose:
      - "8000"
    networks:
      - indctrl

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - auth-service
      - event-service
      - control-web
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/static:ro
    networks:
      - indctrl

volumes:
  postgres_data:
  static_data:

networks:
  indctrl:
    driver: bridge
