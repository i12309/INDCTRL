<!doctype html>
{% load static %}
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · INDCTRL</title>
  <link href="{% static 'vendor/bootstrap/bootstrap.min.css' %}" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #eef2f7;
      display: grid;
      place-items: center;
      color: #172033;
    }

    .login-panel {
      width: min(440px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <main class="login-panel">
    <div class="brand mb-1">INDCTRL</div>
    <div class="text-secondary mb-4">Вход в систему</div>

    {% if form.errors %}
      <div class="alert alert-danger">Проверьте логин и пароль.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label" for="{{ form.username.id_for_label }}">{{ form.username.label }}</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label class="form-label" for="{{ form.password.id_for_label }}">{{ form.password.label }}</label>
        {{ form.password }}
      </div>
      <button class="btn btn-primary w-100" type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
