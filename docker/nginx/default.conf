upstream indctrl {
    server indctrl:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location = /health-web/ {
        proxy_pass http://indctrl/health/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /static/;
        access_log off;
        expires 1h;
    }

    location / {
        proxy_pass http://indctrl;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
